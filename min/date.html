<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Our Date ❤️</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,#ff4b91,#ff8fb8,#ffd6e7);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}
.card{
max-width:800px;
width:100%;
background:rgba(255,255,255,.18);
backdrop-filter:blur(18px);
padding:35px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
color:#fff;
}
h1{font-family:'Great Vibes',cursive;font-size:64px;text-align:center;}
iframe{width:100%;height:300px;border:0;border-radius:18px;margin:15px 0;}
.btn-love{width:100%;height:60px;border:none;border-radius:40px;background:#ff2d75;color:#fff;font-size:22px;font-weight:bold;}
#thanks{display:none;text-align:center;padding:40px;}
#thanks h2{font-family:'Great Vibes',cursive;font-size:64px;}
</style>
</head>
<body>

<div class="card">

<div id="formArea">

<h1>Let's Plan Our Date ❤️</h1>
<p class="text-center">Choose our special day 💕</p>

<form action="https://script.google.com/macros/s/AKfycbwJlDfNnvLTurPBkyWHCXEXazVdCMtT_jrEhohHG-yXU6y3j5t-gnBwd7ShvRH1MqOY/exec" method="POST" target="hiddenFrame" onsubmit="showThanks()">

<label class="form-label">📅 Date</label>
<input class="form-control mb-3" type="date" name="date" required>

<label class="form-label">🕒 Time</label>
<input class="form-control mb-3" type="time" name="time" required>

<label class="form-label">📍 Place</label>
<input class="form-control mb-3" type="text" name="place" placeholder="Where shall we meet?" required>

<h5>🗺️ Suggested Location</h5>
<iframe src="https://www.google.com/maps?q=Kochi&output=embed"></iframe>

<label class="form-label">💌 Message</label>
<textarea class="form-control mb-4" rows="4" name="message" placeholder="Can't wait to see you ❤️"></textarea>

<button class="btn-love" type="submit">❤️ DONE ❤️</button>

</form>

<iframe name="hiddenFrame" style="display:none"></iframe>

</div>

<div id="thanks">
<div style="font-size:90px;">💖</div>
<h2>See You On Our Date!</h2>
<p>I can't wait to spend this special day with you ❤️</p>
</div>

</div>

<script>
function showThanks(){
setTimeout(function(){
document.getElementById("formArea").style.display="none";
document.getElementById("thanks").style.display="block";
},1000);
}
</script>

</body>
</html>
