<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Date With Me ❤️</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            overflow:hidden;
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#ff4b91,#ff9a9e,#fad0c4,#fbc2eb);
            background-size:400% 400%;
            animation:bgMove 12s ease infinite;
            height:100vh;
        }

        @keyframes bgMove{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .hearts{
            position:fixed;
            inset:0;
            overflow:hidden;
            pointer-events:none;
            z-index:0;
        }

        .heart{
            position:absolute;
            color:#fff;
            animation:float linear infinite;
            opacity:.8;
            user-select:none;
        }

        @keyframes float{
            from{
                transform:translateY(100vh) scale(.5);
            }
            to{
                transform:translateY(-120vh) scale(1.4);
            }
        }

        #home{
            position:absolute;
            inset:0;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:2;
        }

        .glass{
            width:700px;
            max-width:92%;
            padding:55px;
            border-radius:35px;

            background:rgba(255,255,255,.18);

            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,.3);

            box-shadow:
            0 15px 40px rgba(0,0,0,.25);
        }

        h1{
            font-family:'Great Vibes',cursive;
            font-size:72px;
            color:white;
            text-shadow:2px 2px 12px rgba(0,0,0,.25);
        }

        .subtitle{
            color:white;
            font-size:22px;
            margin-top:15px;
            margin-bottom:40px;
        }

        .button-area{
            position:relative;
            height:180px;
            width:100%;
        }

        .btn-love{
            position:absolute;

            width:170px;
            height:65px;

            border:none;

            border-radius:50px;

            font-size:22px;

            font-weight:700;

            transition:
            left .25s linear,
            top .25s linear,
            transform .25s;
        }

        .btn-love:hover{
            transform:scale(1.08);
        }

        #yesBtn{
            left:180px;
            top:50px;

            background:#ff2d75;
            color:white;

            box-shadow:0 10px 25px rgba(255,0,98,.45);
        }

        #noBtn{
            left:370px;
            top:50px;

            background:white;
            color:#ff2d75;

            box-shadow:0 10px 25px rgba(255,255,255,.45);
        }

        #celebration{
            display:none;
            position:absolute;
            inset:0;

            justify-content:center;
            align-items:center;

            flex-direction:column;

            text-align:center;

            z-index:4;

            color:white;
        }

        #celebration h2{
            font-family:'Great Vibes',cursive;
            font-size:90px;
        }

        #celebration p{
            font-size:28px;
            margin-top:15px;
            margin-bottom:30px;
        }

        .love-box{
            background:rgba(255,255,255,.18);

            backdrop-filter:blur(20px);

            border-radius:35px;

            padding:50px;

            border:1px solid rgba(255,255,255,.25);

            box-shadow:0 20px 45px rgba(0,0,0,.3);
        }

        .big-heart{
            font-size:95px;
            animation:beat 1s infinite;
        }

        @keyframes beat{

            0%{
                transform:scale(1);
            }

            50%{
                transform:scale(1.25);
            }

            100%{
                transform:scale(1);
            }

        }

        .confetti{
            position:absolute;
            width:10px;
            height:10px;
            border-radius:50%;
            opacity:.9;
            animation:fall linear forwards;
        }

        @keyframes fall{

            from{
                transform:translateY(-20px);
            }

            to{
                transform:translateY(110vh) rotate(720deg);
            }

        }

        @media(max-width:768px){

            h1{
                font-size:55px;
            }

            .subtitle{
                font-size:18px;
            }

            .button-area{
                height:220px;
            }

            .btn-love{
                width:140px;
                height:58px;
                font-size:18px;
            }

            #yesBtn{
                left:70px;
            }

            #noBtn{
                left:230px;
            }

            #celebration h2{
                font-size:65px;
            }

        }
    </style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div id="home">

<div class="glass text-center">

<h1>Will You Go On A Date With Me? ❤️</h1>

<p class="subtitle">
You can only choose one answer... 😉
</p>

<div class="button-area" id="buttonArea">

<a href="date.html">

<button id="yesBtn" class="btn-love">
YES ❤️
</button>
</a>

<button id="noBtn" class="btn-love">
NO 🙈
</button>

</div>

</div>

</div>

<div id="celebration">

<div class="love-box">

<div class="big-heart">
💖
</div>

<h2>Yayyyyy!!</h2>

<p>
You just made me the happiest person alive ❤️
</p>

<h3>
Now our beautiful story begins...
</h3>

</div>

</div>
<script>

const heartsContainer = document.getElementById("hearts");
const celebration = document.getElementById("celebration");
const home = document.getElementById("home");

function createHeart(){

    const heart = document.createElement("div");

    heart.className = "heart";

    heart.innerHTML = ["❤️","💖","💕","💗","💘","💞"][Math.floor(Math.random()*6)];

    heart.style.left = Math.random()*100 + "vw";

    heart.style.fontSize = (18 + Math.random()*32) + "px";

    heart.style.animationDuration = (6 + Math.random()*6) + "s";

    heart.style.opacity = .4 + Math.random()*.6;

    heartsContainer.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },12000);

}

setInterval(createHeart,250);



function confettiBurst(){

    const colors=[
        "#ff2d75",
        "#ff7eb3",
        "#ffd166",
        "#ffffff",
        "#ff5e62",
        "#fcb045",
        "#ff66c4"
    ];

    for(let i=0;i<220;i++){

        const c=document.createElement("div");

        c.className="confetti";

        c.style.left=Math.random()*100+"vw";

        c.style.background=
            colors[Math.floor(Math.random()*colors.length)];

        c.style.width=(6+Math.random()*10)+"px";
        c.style.height=c.style.width;

        c.style.animationDuration=
            (2+Math.random()*3)+"s";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },5000);

    }

}



function showCelebration(){

    home.style.display="none";

    celebration.style.display="flex";

    confettiBurst();

    setInterval(confettiBurst,3500);

}

document
.getElementById("yesBtn")
.addEventListener("click",showCelebration);

</script>
<script>

const noBtn = document.getElementById("noBtn");
const area = document.getElementById("buttonArea");

const SAFE_DISTANCE = 180;
const MARGIN = 10;

function moveNoButton(mouseX, mouseY) {

    const areaRect = area.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();

    const btnCenterX = btnRect.left + btnRect.width / 2;
    const btnCenterY = btnRect.top + btnRect.height / 2;

    const dx = btnCenterX - mouseX;
    const dy = btnCenterY - mouseY;

    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance > SAFE_DISTANCE) return;

    let angle = Math.atan2(dy, dx);

    if (distance < 1) {
        angle = Math.random() * Math.PI * 2;
    }

    const moveDistance = SAFE_DISTANCE - distance + 60;

    let newLeft =
        parseFloat(noBtn.style.left || noBtn.offsetLeft) +
        Math.cos(angle) * moveDistance;

    let newTop =
        parseFloat(noBtn.style.top || noBtn.offsetTop) +
        Math.sin(angle) * moveDistance;

    const maxLeft = areaRect.width - btnRect.width - MARGIN;
    const maxTop = areaRect.height - btnRect.height - MARGIN;

    if (newLeft < MARGIN) newLeft = MARGIN;
    if (newLeft > maxLeft) newLeft = maxLeft;

    if (newTop < MARGIN) newTop = MARGIN;
    if (newTop > maxTop) newTop = maxTop;

    noBtn.style.left = newLeft + "px";
    noBtn.style.top = newTop + "px";
}

document.addEventListener("mousemove", (e) => {
    moveNoButton(e.clientX, e.clientY);
});

document.addEventListener("touchmove", (e) => {
    if (e.touches.length > 0) {
        moveNoButton(
            e.touches[0].clientX,
            e.touches[0].clientY
        );
    }
}, { passive: true });

noBtn.addEventListener("click", (e) => {
    e.preventDefault();

    moveNoButton(
        window.innerWidth / 2,
        window.innerHeight / 2
    );
});

window.addEventListener("resize", () => {

    const btnRect = noBtn.getBoundingClientRect();
    const areaRect = area.getBoundingClientRect();

    let left = parseFloat(noBtn.style.left || noBtn.offsetLeft);
    let top = parseFloat(noBtn.style.top || noBtn.offsetTop);

    const maxLeft = areaRect.width - btnRect.width - MARGIN;
    const maxTop = areaRect.height - btnRect.height - MARGIN;

    if (left > maxLeft) left = maxLeft;
    if (top > maxTop) top = maxTop;

    if (left < MARGIN) left = MARGIN;
    if (top < MARGIN) top = MARGIN;

    noBtn.style.left = left + "px";
    noBtn.style.top = top + "px";
});

</script>

</body>
</html>
